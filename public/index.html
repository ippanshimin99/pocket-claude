<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pocket-claude</title>
<style>
  body { margin: 0; font-family: ui-monospace, Consolas, monospace; background: #1e1e1e; color: #ddd; display: flex; flex-direction: column; height: 100dvh; }
  #log { flex: 1; overflow-y: auto; padding: 12px; white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.5; }
  .user { color: #8ec07c; margin-top: 10px; }
  .assistant { color: #ddd; }
  .tool { color: #888; font-size: 12px; }
  .meta { color: #666; font-size: 12px; }
  .error { color: #fb4934; }
  .perm { color: #fabd2f; font-size: 13px; border: 1px solid #5a4a1a; border-radius: 4px; padding: 6px 8px; margin: 4px 0; }
  .perm button { margin-left: 8px; padding: 2px 12px; }
  #bar { display: flex; gap: 6px; padding: 8px; background: #2a2a2a; position: relative; }
  #suggest { position: absolute; bottom: 100%; left: 8px; right: 8px; background: #2a2a2a; border: 1px solid #555; border-radius: 4px; max-height: 40dvh; overflow-y: auto; display: none; }
  #suggest div { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #383838; }
  #suggest div:hover, #suggest div.sel { background: #3a3a3a; }
  #input { flex: 1; font: inherit; font-size: 16px; background: #1e1e1e; color: #ddd; border: 1px solid #444; border-radius: 4px; padding: 8px; resize: none; }
  button { font: inherit; background: #3a3a3a; color: #ddd; border: 1px solid #555; border-radius: 4px; padding: 8px 14px; }
</style>
</head>
<body>
<div id="log"></div>
<div id="bar">
  <div id="suggest"></div>
  <textarea id="input" rows="2" placeholder="Message (Ctrl+Enter to send)"></textarea>
  <button id="mic">🎤</button>
  <button id="send">Send</button>
  <button id="stop">Stop</button>
</div>
<script>
const log = document.getElementById('log')
const input = document.getElementById('input')
let current = null // current assistant text node

function line(cls, text) {
  const div = document.createElement('div')
  div.className = cls
  div.textContent = text
  log.appendChild(div)
  log.scrollTop = log.scrollHeight
  return div
}

const es = new EventSource('/events')
es.onmessage = (e) => {
  const ev = JSON.parse(e.data)
  if (ev.type === 'text') {
    if (!current) current = line('assistant', '')
    current.textContent += ev.text
    log.scrollTop = log.scrollHeight
  } else if (ev.type === 'tool') {
    current = null
    line('tool', '⏺ ' + ev.name + ' …')
  } else if (ev.type === 'tool_input') {
    const last = log.lastElementChild
    if (last && last.className === 'tool' && last.textContent === '⏺ ' + ev.name + ' …') {
      last.textContent = '⏺ ' + ev.name + ': ' + ev.summary
    } else {
      line('tool', '⏺ ' + ev.name + ': ' + ev.summary)
    }
  } else if (ev.type === 'permission') {
    current = null
    const div = line('perm', `⚠ ${ev.tool}: ${ev.summary}`)
    div.dataset.permId = ev.id
    for (const [label, allow] of [['Allow', true], ['Deny', false]]) {
      const btn = document.createElement('button')
      btn.textContent = label
      btn.onclick = () => fetch('/permission', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: ev.id, allow }),
      })
      div.appendChild(btn)
    }
  } else if (ev.type === 'permission_resolved') {
    const div = log.querySelector(`[data-perm-id="${ev.id}"]`)
    if (div) {
      div.querySelectorAll('button').forEach((b) => b.remove())
      div.textContent += ev.allow ? '  → allowed' : '  → denied'
    }
  } else if (ev.type === 'clear') {
    log.innerHTML = ''
    current = null
  } else if (ev.type === 'user') {
    current = null
    line('user', '> ' + ev.text)
  } else if (ev.type === 'done') {
    current = null
    line('meta', `— done (${ev.num_turns} turns, ${Math.round(ev.duration_ms / 1000)}s)`)
  } else if (ev.type === 'init') {
    line('meta', `[session] model=${ev.model} cwd=${ev.cwd}`)
  } else if (ev.type === 'info') {
    current = null
    line('meta', ev.text)
  } else if (ev.type === 'error') {
    current = null
    line('error', 'ERROR: ' + ev.message)
  }
}
es.onerror = () => line('error', '(connection lost, reconnecting…)')

async function send() {
  const text = input.value.trim()
  if (!text) return
  input.value = ''
  await fetch('/message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
}
document.getElementById('send').onclick = send
document.getElementById('stop').onclick = () => fetch('/interrupt', { method: 'POST' })

// ---- slash command suggest ----
const suggest = document.getElementById('suggest')
let commands = ['clear', 'compact', 'context', 'usage'] // fallback until /commands responds
fetch('/commands').then(r => r.json()).then(d => {
  if (d.commands?.length) commands = d.commands
}).catch(() => {})

function renderSuggest() {
  const v = input.value
  if (!v.startsWith('/') || /\s/.test(v)) { suggest.style.display = 'none'; return }
  const typed = v.slice(1).toLowerCase()
  const hits = commands.filter(c => c.toLowerCase().startsWith(typed))
  if (!hits.length) { suggest.style.display = 'none'; return }
  suggest.innerHTML = ''
  hits.forEach((c, i) => {
    const div = document.createElement('div')
    div.textContent = '/' + c
    if (i === 0) div.className = 'sel'
    div.onclick = () => { input.value = '/' + c; suggest.style.display = 'none'; input.focus() }
    suggest.appendChild(div)
  })
  suggest.style.display = 'block'
}
input.addEventListener('input', renderSuggest)
input.addEventListener('keydown', (e) => {
  if (suggest.style.display === 'block' && (e.key === 'Tab' || e.key === 'Enter') && !e.ctrlKey) {
    e.preventDefault()
    suggest.firstElementChild?.onclick()
    return
  }
  if (e.key === 'Escape') suggest.style.display = 'none'
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); send() }
})

// ---- voice input (Web Speech API: needs HTTPS or localhost — tailscale serve provides HTTPS) ----
const micBtn = document.getElementById('mic')
const SR = window.SpeechRecognition || window.webkitSpeechRecognition
if (!SR) {
  micBtn.disabled = true
  micBtn.title = 'Speech recognition not supported in this browser'
} else {
  let rec = null
  let baseText = ''
  micBtn.onclick = () => {
    if (rec) { rec.stop(); return }
    rec = new SR()
    rec.lang = navigator.language || 'en-US'
    rec.interimResults = true
    rec.continuous = true
    baseText = input.value
    micBtn.style.background = '#a33'
    rec.onresult = (e) => {
      let finalText = ''
      let interim = ''
      for (const r of e.results) {
        if (r.isFinal) finalText += r[0].transcript
        else interim += r[0].transcript
      }
      input.value = baseText + finalText + interim
    }
    rec.onend = () => {
      micBtn.style.background = ''
      rec = null
    }
    rec.onerror = rec.onend
    rec.start()
  }
}
</script>
</body>
</html>
