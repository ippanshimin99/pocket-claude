<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>pocket-claude</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css" crossorigin>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:ui-monospace,'Cascadia Code',Consolas,monospace;background:#1a1a1a;color:#d4d4d4;display:flex;flex-direction:column;height:100dvh;overscroll-behavior:none}

/* tabs */
#tabs{display:flex;background:#222;border-bottom:1px solid #2a2a2a;flex-shrink:0}
#tabs button{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:#555;padding:11px 0;font:inherit;font-size:13px;cursor:pointer;position:relative;transition:color .15s;-webkit-tap-highlight-color:transparent}
#tabs button.active{color:#d4d4d4;border-bottom-color:#569cd6}
#tabs button:hover:not(.active){color:#999}
#tabs button .dot{position:absolute;top:8px;right:10px;width:6px;height:6px;border-radius:50%;background:#e5c07b;display:none}

/* panes */
.pane{flex:1;display:none;flex-direction:column;min-height:0;overflow:hidden}
.pane.active{display:flex}

/* log — NO white-space:pre-wrap here (conflicts with innerHTML markdown) */
#log{flex:1;overflow-y:auto;padding:14px 14px 6px;word-break:break-word;font-size:14px;line-height:1.65;-webkit-overflow-scrolling:touch}

/* message types — only text-content elements get pre-wrap */
.user{color:#6a9955;margin:16px 0 2px;padding:8px 12px;background:#192219;border-left:2px solid #3a6a3a;border-radius:0 6px 6px 0;white-space:pre-wrap;animation:fadeUp .18s ease}
.assistant{color:#d4d4d4;margin:2px 0;animation:fadeUp .18s ease}
.tool{color:#444;font-size:12px;padding:1px 0;white-space:pre-wrap}
.meta{color:#363636;font-size:12px;padding:1px 0;white-space:pre-wrap}
.warn{color:#e5c07b;font-size:12px;padding:2px 0;white-space:pre-wrap;animation:fadeUp .18s ease}
.error{color:#f44747;background:#190a0a;border-left:3px solid #f44747;padding:6px 12px;border-radius:0 6px 6px 0;margin:4px 0;white-space:pre-wrap;animation:fadeUp .18s ease}
.perm{color:#e5c07b;font-size:13px;border:1px solid #3d3010;background:#1c1700;border-radius:8px;padding:10px 14px;margin:8px 0;animation:fadeUp .18s ease}
.perm button{margin-left:8px;padding:4px 16px;font-size:12px;-webkit-tap-highlight-color:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* markdown — inline */
.assistant :not(pre)>code{background:#2a2a2a;color:#9cdcfe;padding:1px 6px;border-radius:4px;font-size:13px;font-family:inherit}
.assistant strong{color:#dcdcaa;font-weight:bold}
.assistant em{color:#c586c0;font-style:italic}
.assistant del{color:#555;text-decoration:line-through}
.assistant a{color:#4ec9b0;text-decoration:underline}
.assistant h1,.assistant h2{color:#569cd6;font-size:1em;font-weight:bold;margin:14px 0 5px;padding-bottom:4px;border-bottom:1px solid #2a2a2a}
.assistant h3,.assistant h4{color:#569cd6;font-size:1em;font-weight:bold;margin:10px 0 3px}
.assistant ul,.assistant ol{margin:5px 0;padding-left:24px}
.assistant li{margin:3px 0}
.assistant blockquote{border-left:3px solid #333;margin:6px 0;padding:2px 0 2px 14px;color:#666}
.assistant hr{border:none;border-top:1px solid #2a2a2a;margin:10px 0}
.assistant table{border-collapse:collapse;margin:8px 0;width:100%;font-size:13px}
.assistant th,.assistant td{border:1px solid #2a2a2a;padding:5px 10px;text-align:left}
.assistant th{background:#252525;color:#9cdcfe}
.assistant tr:nth-child(even){background:#1e1e1e}

/* code block */
.code-wrap{margin:10px 0;border-radius:8px;overflow:hidden;border:1px solid #2a2a2a}
.code-header{display:flex;align-items:center;justify-content:space-between;background:#252525;padding:5px 14px;border-bottom:1px solid #2a2a2a}
.lang-label{color:#444;font-size:11px;letter-spacing:.4px}
.copy-btn{background:none;border:1px solid #333;color:#555;font:inherit;font-size:11px;padding:2px 12px;border-radius:4px;cursor:pointer;transition:all .15s;min-width:54px;-webkit-tap-highlight-color:transparent}
.copy-btn:hover{border-color:#4ec9b0;color:#4ec9b0}
.copy-btn.ok{border-color:#6a9955;color:#6a9955}
.code-wrap .hljs{margin:0!important;border-radius:0!important;padding:14px!important;font-size:13px!important;line-height:1.5!important;overflow-x:auto}
.code-wrap pre{margin:0;background:#1e1e1e;overflow-x:auto}
.code-wrap pre code.plain{display:block;padding:14px;color:#d4d4d4;font-size:13px;line-height:1.5}

/* thinking */
#thinking{display:none;color:#383838;font-size:13px;padding:3px 14px 5px}
#thinking.on{display:block}
#thinking::after{content:'▋';animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* input bar */
#bar{display:flex;flex-wrap:wrap;gap:6px;padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:#1e1e1e;border-top:1px solid #2a2a2a;position:relative;flex-shrink:0}
#img-preview{display:none;align-items:center;gap:8px;width:100%}
#img-preview img{height:52px;border-radius:6px;border:1px solid #333;object-fit:cover}
#img-preview .clear-img{background:none;border:1px solid #5a1a1a;color:#f44747;padding:3px 10px;font-size:12px;border-radius:4px;cursor:pointer}
#input{flex:1;font:inherit;font-size:15px;background:#252525;color:#d4d4d4;border:1px solid #2a2a2a;border-radius:8px;padding:9px 12px;resize:none;min-height:40px;max-height:180px;overflow-y:auto;line-height:1.5;transition:border-color .15s}
#input:focus{outline:none;border-color:#3d5a7a}
#input:disabled{opacity:.4;cursor:not-allowed}
button{font:inherit;background:#252525;color:#888;border:1px solid #333;border-radius:6px;padding:8px 14px;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button:hover:not(:disabled){background:#2d2d2d;color:#d4d4d4}
button:disabled{opacity:.4;cursor:not-allowed}
#send{background:#1a2d1a;border-color:#2d5a2d;color:#6a9955;font-weight:bold}
#send:hover:not(:disabled){background:#253d25;color:#98c379}
#stop{background:#2d1a1a;border-color:#5a2d2d;color:#f44747}
#stop:hover:not(:disabled){background:#3d2020}

/* slash suggest */
#suggest{position:absolute;bottom:100%;left:8px;right:8px;background:#252525;border:1px solid #333;border-radius:8px;max-height:40dvh;overflow-y:auto;display:none;box-shadow:0 -6px 24px rgba(0,0,0,.5);margin-bottom:4px}
#suggest div{padding:10px 14px;cursor:pointer;border-bottom:1px solid #2a2a2a;font-size:13px;color:#888}
#suggest div:last-child{border-bottom:none}
#suggest div:hover,#suggest div.sel{background:#2d3748;color:#d4d4d4}

/* scroll-to-bottom */
#scroll-btn{position:fixed;bottom:90px;right:14px;z-index:100;width:34px;height:34px;border-radius:50%;background:#252525;border:1px solid #3a3a3a;color:#569cd6;font-size:18px;display:none;align-items:center;justify-content:center;padding:0;box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer}
#scroll-btn.on{display:flex}

/* connection dot */
#conn{position:fixed;top:13px;right:12px;z-index:200;width:7px;height:7px;border-radius:50%;background:#6a9955;transition:background .3s;pointer-events:none}
#conn.off{background:#f44747;animation:cpulse 1.5s ease infinite}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.3}}

/* previews */
.previewbar{display:flex;gap:6px;align-items:center;padding:8px 12px;background:#1e1e1e;border-bottom:1px solid #2a2a2a;font-size:12px;color:#555;flex-shrink:0}
.previewbar .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.previewbody{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;overflow:auto;background:#141414}
.previewbody img,.previewbody video{max-width:100%;max-height:100%}
.empty{color:#333;font-size:13px}
#webFrame{flex:1;border:none;width:100%;background:#fff}
#webPort{width:70px;font:inherit;font-size:12px;background:#1a1a1a;color:#d4d4d4;border:1px solid #333;border-radius:4px;padding:4px 8px}
</style>
</head>
<body>
<div id="conn"></div>

<div id="tabs">
  <button data-pane="chat" class="active">Chat<span class="dot"></span></button>
  <button data-pane="image">Image<span class="dot"></span></button>
  <button data-pane="video">Movie<span class="dot"></span></button>
  <button data-pane="web">Web<span class="dot"></span></button>
</div>

<div class="pane active" id="pane-chat">
  <div id="log"></div>
  <div id="thinking"></div>
  <div id="bar">
    <div id="suggest"></div>
    <div id="img-preview">
      <img id="img-thumb" src="">
      <button class="clear-img" id="clear-img">✕ Remove</button>
    </div>
    <textarea id="input" rows="1" placeholder="Message…"></textarea>
    <button id="attach" title="Attach image">📎</button>
    <input id="file-input" type="file" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none">
    <button id="mic">🎤</button>
    <button id="send">Send</button>
    <button id="stop">Stop</button>
  </div>
</div>

<div class="pane" id="pane-image">
  <div class="previewbar"><span class="label" id="imageLabel">Nothing set</span><button id="imageReload">↻ Reload</button></div>
  <div class="previewbody" id="imageBody"><span class="empty">Nothing set — ask Claude to show an image</span></div>
</div>
<div class="pane" id="pane-video">
  <div class="previewbar"><span class="label" id="videoLabel">Nothing set</span><button id="videoReload">↻ Reload</button></div>
  <div class="previewbody" id="videoBody"><span class="empty">Nothing set — ask Claude to show a video</span></div>
</div>
<div class="pane" id="pane-web">
  <div class="previewbar">
    <span>port</span><input id="webPort" inputmode="numeric" placeholder="5173">
    <button id="webGo">Open</button>
    <button id="webReload">↻ Reload</button>
    <span class="label" id="webLabel">Nothing set</span>
  </div>
  <iframe id="webFrame"></iframe>
</div>

<button id="scroll-btn">↓</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" crossorigin></script>
<script>
const log = document.getElementById('log')
const input = document.getElementById('input')
const thinking = document.getElementById('thinking')
const sendBtn = document.getElementById('send')
const scrollBtn = document.getElementById('scroll-btn')
const connDot = document.getElementById('conn')
let current = null

// ── tabs ──────────────────────────────────────────────────────
const tabs = [...document.querySelectorAll('#tabs button')]
function showPane(name) {
  tabs.forEach(b => b.classList.toggle('active', b.dataset.pane === name))
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + name))
  tabs.find(b => b.dataset.pane === name).querySelector('.dot').style.display = 'none'
  if (name === 'image') refreshImage()
  if (name === 'video') refreshVideo()
}
tabs.forEach(b => (b.onclick = () => showPane(b.dataset.pane)))
function badge(name) {
  const btn = tabs.find(b => b.dataset.pane === name)
  if (!btn.classList.contains('active')) btn.querySelector('.dot').style.display = 'block'
}

// ── previews ──────────────────────────────────────────────────
const state = { image: null, video: null, web: null }
function refreshImage() {
  if (!state.image) return
  document.getElementById('imageLabel').textContent = state.image
  document.getElementById('imageBody').innerHTML = `<img src="/preview/image?t=${Date.now()}">`
}
function refreshVideo() {
  if (!state.video) return
  document.getElementById('videoLabel').textContent = state.video
  document.getElementById('videoBody').innerHTML = `<video src="/preview/video?t=${Date.now()}" controls autoplay muted></video>`
}
function refreshWeb() {
  if (!state.web) return
  document.getElementById('webLabel').textContent = '127.0.0.1:' + state.web
  document.getElementById('webPort').value = state.web
  document.getElementById('webFrame').src = `/web/${state.web}/?t=${Date.now()}`
}
document.getElementById('imageReload').onclick = refreshImage
document.getElementById('videoReload').onclick = refreshVideo
document.getElementById('webReload').onclick = refreshWeb
document.getElementById('webGo').onclick = () => {
  const p = Number(document.getElementById('webPort').value)
  if (p) { state.web = p; refreshWeb() }
}
fetch('/preview/state').then(r => r.json()).then(s => {
  if (s.image) state.image = s.image
  if (s.video) state.video = s.video
  if (s.web) state.web = s.web
}).catch(() => {})

// ── scroll tracking ────────────────────────────────────────────
let userScrolled = false
log.addEventListener('scroll', () => {
  const atBottom = log.scrollHeight - log.scrollTop - log.clientHeight < 80
  userScrolled = !atBottom
  scrollBtn.classList.toggle('on', userScrolled && document.getElementById('pane-chat').classList.contains('active'))
})
scrollBtn.onclick = () => {
  log.scrollTop = log.scrollHeight
  userScrolled = false
  scrollBtn.classList.remove('on')
}

// ── chat log helpers ───────────────────────────────────────────
function line(cls, text) {
  const div = document.createElement('div')
  div.className = cls
  div.textContent = text
  log.appendChild(div)
  if (!userScrolled) log.scrollTop = log.scrollHeight
  return div
}

// ── markdown renderer ─────────────────────────────────────────
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// copy button handler — called via onclick in generated HTML
function copyCode(btn) {
  const code = btn.closest('.code-wrap').querySelector('code').innerText
  const done = () => {
    btn.textContent = 'Copied!'
    btn.classList.add('ok')
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok') }, 2000)
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(done).catch(done)
  } else {
    const ta = Object.assign(document.createElement('textarea'), {
      value: code, style: 'position:fixed;opacity:0'
    })
    document.body.appendChild(ta); ta.select(); document.execCommand('copy')
    document.body.removeChild(ta); done()
  }
}

// inline markdown on already-escaped HTML string
function inl(h) {
  // links — only allow http/https/mailto
  h = h.replace(/\[([^\]]*)\]\(([^)]*)\)/g, (_, text, url) => {
    const safe = /^https?:|^mailto:/i.test(url.replace(/&amp;/g,'&')) ? url : '#'
    return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${text}</a>`
  })
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>')
  h = h.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>')
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
  h = h.replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
  h = h.replace(/~~([^~]+)~~/g, '<del>$1</del>')
  return h
}

// block-level renderer: processes line by line
function renderBlock(text) {
  const lines = esc(text).split('\n')
  const out = []
  let listType = null
  let tableLines = []

  function closeList() {
    if (listType) { out.push(`</${listType}>`); listType = null }
  }
  function flushTable() {
    if (!tableLines.length) return
    const rows = tableLines.filter((_, i) => i !== 1)
    if (!rows.length) { tableLines = []; return }
    const head = rows[0].split('|').map(c => c.trim()).filter(Boolean)
    const body = rows.slice(1)
    out.push('<table><thead><tr>' + head.map(c => `<th>${inl(c)}</th>`).join('') + '</tr></thead><tbody>')
    body.forEach(row => {
      const cells = row.split('|').map(c => c.trim()).filter(c => c !== '')
      if (cells.length) out.push('<tr>' + cells.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>')
    })
    out.push('</tbody></table>')
    tableLines = []
  }

  for (const line of lines) {
    // table detection: line starts with |
    if (line.trimStart().startsWith('|')) {
      closeList(); tableLines.push(line); continue
    } else {
      flushTable()
    }

    const head = line.match(/^(#{1,4}) (.*)$/)
    const ulItem = line.match(/^[*-] (.+)$/)
    const olItem = line.match(/^(\d+)\. (.+)$/)
    const bq = line.match(/^&gt; (.+)$/)

    if (head) {
      closeList()
      const lvl = head[1].length
      out.push(`<h${lvl}>${inl(head[2])}</h${lvl}>`)
    } else if (/^[-*]{3,}$/.test(line)) {
      closeList(); out.push('<hr>')
    } else if (ulItem) {
      if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul' }
      out.push(`<li>${inl(ulItem[1])}</li>`)
    } else if (olItem) {
      if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol' }
      out.push(`<li>${inl(olItem[2])}</li>`)
    } else if (bq) {
      closeList(); out.push(`<blockquote>${inl(bq[1])}</blockquote>`)
    } else if (line === '') {
      closeList(); out.push('<br>')
    } else {
      closeList(); out.push(inl(line) + '<br>')
    }
  }
  closeList(); flushTable()
  return out.join('')
}

function renderMarkdown(raw) {
  // close unclosed code fences for streaming safety
  const n = (raw.match(/```/g) || []).length
  const src = n % 2 === 1 ? raw + '\n```' : raw
  const out = []
  let last = 0
  const RE = /```(\w*)\n([\s\S]*?)```/g
  let m
  while ((m = RE.exec(src)) !== null) {
    if (m.index > last) out.push(renderBlock(src.slice(last, m.index)))
    const lang = m[1] || ''
    const code = m[2]
    let highlighted = esc(code)
    if (window.hljs) {
      try {
        highlighted = lang
          ? hljs.highlight(code, { language: lang, ignoreIllegals: true }).value
          : hljs.highlightAuto(code).value
      } catch { /* fallback to escaped */ }
    }
    const langLabel = esc(lang || 'code')
    out.push(
      `<div class="code-wrap">` +
      `<div class="code-header"><span class="lang-label">${langLabel}</span>` +
      `<button class="copy-btn" onclick="copyCode(this)">Copy</button></div>` +
      `<pre class="hljs"><code${lang ? ` class="language-${langLabel}"` : ' class="plain"'}>${highlighted}</code></pre>` +
      `</div>`
    )
    last = m.index + m[0].length
  }
  if (last < src.length) out.push(renderBlock(src.slice(last)))
  return out.join('')
}

// ── busy / thinking / RAF rendering ───────────────────────────
let isBusy = false
let rawText = ''
let rafId = null

function setBusy(busy) {
  isBusy = busy
  sendBtn.disabled = busy
  input.disabled = busy
  thinking.classList.toggle('on', busy)
  if (!busy && rafId) { cancelAnimationFrame(rafId); rafId = null }
}

function scheduleRender() {
  if (rafId) return
  rafId = requestAnimationFrame(() => {
    rafId = null
    if (current) {
      current.innerHTML = renderMarkdown(rawText)
      if (!userScrolled) log.scrollTop = log.scrollHeight
    }
  })
}

// ── SSE ───────────────────────────────────────────────────────
const es = new EventSource('/events')
es.onopen = () => connDot.classList.remove('off')
es.onerror = () => {
  connDot.classList.add('off')
  setBusy(false)
  line('warn', '⚡ connection lost — reconnecting…')
}

es.onmessage = (e) => {
  const ev = JSON.parse(e.data)

  if (ev.type === 'text') {
    thinking.classList.remove('on')
    rawText += ev.text
    if (!current) {
      current = document.createElement('div')
      current.className = 'assistant'
      log.appendChild(current)
    }
    scheduleRender()

  } else if (ev.type === 'tool') {
    rawText = ''; current = null; thinking.classList.remove('on')
    line('tool', '⏺ ' + ev.name + ' …')

  } else if (ev.type === 'tool_input') {
    const last = log.lastElementChild
    if (last?.className === 'tool' && last.textContent === '⏺ ' + ev.name + ' …')
      last.textContent = '⏺ ' + ev.name + ': ' + ev.summary
    else line('tool', '⏺ ' + ev.name + ': ' + ev.summary)

  } else if (ev.type === 'image') {
    state.image = ev.label; badge('image')
    if (document.getElementById('pane-image').classList.contains('active')) refreshImage()

  } else if (ev.type === 'video') {
    state.video = ev.label; badge('video')
    if (document.getElementById('pane-video').classList.contains('active')) refreshVideo()

  } else if (ev.type === 'web') {
    state.web = ev.port; badge('web')
    if (document.getElementById('pane-web').classList.contains('active')) refreshWeb()

  } else if (ev.type === 'permission') {
    rawText = ''; current = null; thinking.classList.remove('on')
    const div = line('perm', `⚠ ${ev.tool}: ${ev.summary}`)
    div.dataset.permId = ev.id
    for (const [label, allow] of [['Allow', true], ['Deny', false]]) {
      const btn = document.createElement('button')
      btn.textContent = label
      btn.onclick = () => fetch('/permission', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: ev.id, allow }),
      })
      div.appendChild(btn)
    }

  } else if (ev.type === 'permission_resolved') {
    const div = log.querySelector(`[data-perm-id="${ev.id}"]`)
    if (div) {
      div.querySelectorAll('button').forEach(b => b.remove())
      div.textContent += ev.allow ? '  → allowed' : '  → denied'
    }

  } else if (ev.type === 'clear') {
    log.innerHTML = ''; current = null; rawText = ''; setBusy(false)
    state.image = state.video = state.web = null
    document.getElementById('imageLabel').textContent = 'Nothing set'
    document.getElementById('imageBody').innerHTML = '<span class="empty">Nothing set — ask Claude to show an image</span>'
    document.getElementById('videoLabel').textContent = 'Nothing set'
    document.getElementById('videoBody').innerHTML = '<span class="empty">Nothing set — ask Claude to show a video</span>'
    document.getElementById('webLabel').textContent = 'Nothing set'
    document.getElementById('webPort').value = ''
    document.getElementById('webFrame').src = 'about:blank'
    tabs.forEach(b => (b.querySelector('.dot').style.display = 'none'))

  } else if (ev.type === 'user') {
    current = null; rawText = ''
    line('user', '> ' + ev.text)
    setBusy(true)

  } else if (ev.type === 'done') {
    current = null; rawText = ''; setBusy(false)
    line('meta', `— done (${ev.num_turns} turns, ${Math.round(ev.duration_ms / 1000)}s)`)

  } else if (ev.type === 'init') {
    line('meta', `[session] model=${ev.model} cwd=${ev.cwd}`)

  } else if (ev.type === 'info') {
    current = null
    line(ev.text.includes('crashed') ? 'warn' : 'meta', ev.text)
    if (ev.text.includes('restarting')) setBusy(false)

  } else if (ev.type === 'error') {
    current = null; rawText = ''; setBusy(false)
    line('error', '⚠ ' + ev.message)
  }
}

// ── image attachment ───────────────────────────────────────────
let pendingImage = null
const imgPreview = document.getElementById('img-preview')
const imgThumb = document.getElementById('img-thumb')

function setPendingImage(file) {
  if (!file) return
  if (!['image/jpeg','image/png','image/gif','image/webp'].includes(file.type)) {
    alert('Supported formats: JPEG, PNG, GIF, WebP'); return
  }
  const reader = new FileReader()
  reader.onload = () => {
    const img = new Image()
    img.onload = () => {
      const MAX = 1920
      let { width: w, height: h } = img
      if (w > MAX || h > MAX) { const s = MAX / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s) }
      const c = document.createElement('canvas')
      c.width = w; c.height = h
      c.getContext('2d').drawImage(img, 0, 0, w, h)
      const data = c.toDataURL('image/jpeg', .85).split(',')[1]
      pendingImage = { data, mediaType: 'image/jpeg', objectUrl: URL.createObjectURL(file) }
      imgThumb.src = pendingImage.objectUrl
      imgPreview.style.display = 'flex'
    }
    img.src = reader.result
  }
  reader.readAsDataURL(file)
}
document.getElementById('clear-img').onclick = () => {
  if (pendingImage?.objectUrl) URL.revokeObjectURL(pendingImage.objectUrl)
  pendingImage = null; imgPreview.style.display = 'none'; imgThumb.src = ''
}
document.getElementById('attach').onclick = () => document.getElementById('file-input').click()
document.getElementById('file-input').onchange = e => {
  if (e.target.files[0]) setPendingImage(e.target.files[0]); e.target.value = ''
}
document.addEventListener('paste', e => {
  for (const item of e.clipboardData?.items ?? []) {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      const file = item.getAsFile()
      if (file) { setPendingImage(file); e.preventDefault() }
      break
    }
  }
})

// ── send ──────────────────────────────────────────────────────
async function send() {
  const text = input.value.trim()
  if (!text && !pendingImage) return
  if (isBusy) return
  input.value = ''
  input.style.height = 'auto'
  const body = { text }
  if (pendingImage) {
    body.image = { data: pendingImage.data, mediaType: pendingImage.mediaType }
    if (pendingImage.objectUrl) URL.revokeObjectURL(pendingImage.objectUrl)
    pendingImage = null; imgPreview.style.display = 'none'; imgThumb.src = ''
  }
  try {
    const res = await fetch('/message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      line('error', '⚠ send failed: ' + (err.error || res.status))
      setBusy(false)
    }
  } catch (e) {
    line('error', '⚠ network error — is the server running?')
    setBusy(false)
  }
}
document.getElementById('send').onclick = send
document.getElementById('stop').onclick = () => fetch('/interrupt', { method: 'POST' })

// ── auto-resize textarea ──────────────────────────────────────
input.addEventListener('input', () => {
  input.style.height = 'auto'
  input.style.height = Math.min(input.scrollHeight, 180) + 'px'
})

// ── slash commands ────────────────────────────────────────────
const suggest = document.getElementById('suggest')
let commands = ['clear', 'compact', 'context', 'usage']
fetch('/commands').then(r => r.json()).then(d => {
  if (d.commands?.length) commands = d.commands
}).catch(() => {})

function renderSuggest() {
  const v = input.value
  if (!v.startsWith('/') || /\s/.test(v)) { suggest.style.display = 'none'; return }
  const typed = v.slice(1).toLowerCase()
  const hits = commands.filter(c => c.toLowerCase().startsWith(typed))
  if (!hits.length) { suggest.style.display = 'none'; return }
  suggest.innerHTML = ''
  hits.forEach((c, i) => {
    const div = document.createElement('div')
    div.textContent = '/' + c
    if (i === 0) div.className = 'sel'
    div.onclick = () => { input.value = '/' + c; suggest.style.display = 'none'; input.focus() }
    suggest.appendChild(div)
  })
  suggest.style.display = 'block'
}
input.addEventListener('input', renderSuggest)
input.addEventListener('keydown', e => {
  if (suggest.style.display === 'block' && (e.key === 'Tab' || e.key === 'Enter') && !e.ctrlKey) {
    e.preventDefault(); suggest.firstElementChild?.onclick(); return
  }
  if (e.key === 'Escape') suggest.style.display = 'none'
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); send() }
})

// ── voice input ───────────────────────────────────────────────
const micBtn = document.getElementById('mic')
const SR = window.SpeechRecognition || window.webkitSpeechRecognition
if (!SR) {
  micBtn.disabled = true
  micBtn.title = 'Speech recognition not supported in this browser'
} else {
  let rec = null, baseText = ''
  micBtn.onclick = () => {
    if (rec) { rec.stop(); return }
    rec = new SR()
    rec.lang = navigator.language || 'en-US'
    rec.interimResults = true
    rec.continuous = true
    baseText = input.value
    micBtn.style.cssText = 'background:#5a1a1a;border-color:#8a2a2a;color:#f44747'
    rec.onresult = e => {
      let final = '', interim = ''
      for (const r of e.results) {
        if (r.isFinal) final += r[0].transcript
        else interim += r[0].transcript
      }
      input.value = baseText + final + interim
      input.dispatchEvent(new Event('input'))
    }
    rec.onend = () => { micBtn.style.cssText = ''; rec = null }
    rec.onerror = rec.onend
    rec.start()
  }
}
</script>
